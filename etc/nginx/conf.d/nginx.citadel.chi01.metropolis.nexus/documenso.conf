server {
    listen 443 quic;
    listen 443 ssl;
    listen [::]:443 quic;
    listen [::]:443 ssl;
    listen 8443 ssl proxy_protocol;

    server_name documenso.metropolis.nexus;

    ssl_certificate /etc/letsencrypt/live/documenso.metropolis.nexus/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/documenso.metropolis.nexus/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/documenso.metropolis.nexus/chain.pem;

    include headers-more.d/universal.conf;
    include snippets/proxy.conf;

    more_clear_headers X-Robots-Tag;

    # Not sure if this covers all of the registration APIs or not
    # Need to check
    location ^~ /signup {
        return 308 https://$host;
    }

    location / {
        proxy_pass http://192.168.0.110:3000;
    }
    
}
