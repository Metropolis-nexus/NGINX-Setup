server {
    listen 443 quic;
    listen 443 ssl;
    listen [::]:443 quic;
    listen [::]:443 ssl;
    listen 8443 ssl proxy_protocol;

    server_name nas01.metropolis.nexus;

    ssl_certificate /etc/letsencrypt/live/nas01.metropolis.nexus/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nas01.metropolis.nexus/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/nas01.metropolis.nexus/chain.pem;

    include headers-more.d/universal.conf;
    include snippets/proxy.conf;

    more_clear_headers Cross-Origin-Embedder-Policy;

    proxy_hide_header Content-Security-Policy;
    more_set_headers "Content-Security-Policy: default-src 'none'; connect-src 'self'; font-src 'self'; img-src 'self' https://media.sys.truenas.net; manifest-src 'self'; script-src 'unsafe-eval'; script-src-attr 'unsafe-inline'; script-src-elem 'self' 'unsafe-inline'; $style_src_type7; worker-src 'self'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests; base-uri 'self'";

    proxy_ssl_verify on;
    proxy_ssl_name nas.citadel.chi01.metropolis.nexus;

    modsecurity on;
    modsecurity_rules '
        Include /etc/nginx/modsecurity.d/modsecurity.conf
        Include /etc/nginx/modsecurity.d/crs.conf
        Include /etc/nginx/modsecurity.d/crs-level-4.conf

        SecAction \
            "id:900220,\
            phase:1,\
            pass,\
            t:none,\
            nolog,\
            tag:\'OWASP_CRS\',\
            setvar:\'tx.allowed_request_content_type=|application/x-www-form-urlencoded| |multipart/form-data| |text/xml| |application/xml| |application/soap+xml| |application/json| |text/plain|\'"
            
        Include /etc/nginx/modsecurity.d/exclusions.conf
        Include /etc/nginx/modsecurity.d/coreruleset/rules/*.conf

        # Level 1
        SecRuleUpdateTargetById 930130 !REQUEST_FILENAME

        # Authentik Proxy
        SecRuleUpdateTargetById 920273 !ARGS:rd
        SecRuleUpdateTargetById 942460 !ARGS:rd
    ';

    location /ui/assets/favicons/site.webmanifest {
        proxy_pass https://192.168.0.106;
    }

    location / {
        proxy_pass https://192.168.0.106;
        include headers-more.d/authentik-proxy.conf;
    }

}
