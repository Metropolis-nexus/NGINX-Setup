server {
    listen 443 quic;
    listen 443 ssl;
    listen [::]:443 quic;
    listen [::]:443 ssl;
    listen 8443 ssl proxy_protocol;

    server_name detection.55.metropolis.nexus;

    ssl_certificate /etc/letsencrypt/live/detection.55.metropolis.nexus/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/detection.55.metropolis.nexus/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/detection.55.metropolis.nexus/chain.pem;

    include headers-more.d/universal.conf;
    include snippets/proxy.conf;

    modsecurity on;
    modsecurity_rules '
        Include /etc/nginx/modsecurity.d/modsecurity.conf
        Include /etc/nginx/modsecurity.d/crs.conf
        Include /etc/nginx/modsecurity.d/crs-level-1.conf
        Include /etc/nginx/modsecurity.d/exclusions.conf
        Include /etc/nginx/modsecurity.d/coreruleset/rules/*.conf

        # Authentik Proxy
        SecRuleUpdateTargetById 920273 !ARGS:rd
        SecRuleUpdateTargetById 942460 !ARGS:rd
    ';

    location = /rss {
        proxy_pass http://192.168.0.129:5001;
    }

    location /api {
        proxy_pass http://192.168.0.129:5001;
    }

    location / {
        proxy_pass http://192.168.0.129:5001;
        include headers-more.d/authentik-proxy.conf;
    }
    
}
