# No Host Header
# With https usually SNI is used making the Host header unnecessary
# Level 1
SecRuleRemoveById 920280

# Rule requiring Accept header                                               
# Breaks innocent clients
# Level 3
SecRuleRemoveById 920300

# Overzealous rules breaking innocent Referrer headers
# Level 2
SecRuleUpdateTargetById 932239 !REQUEST_HEADERS:Referer
# Level 3
SecRuleUpdateTargetById 932237 !REQUEST_HEADERS:Referer

# Warning on Authentik cookie - introduced in v4.24.0
# Level 4
SecRuleUpdateTargetById 942421 !REQUEST_COOKIES:/^authentik_proxy_.*$/

# Broken rule in CRS v4.24.0
# Level 2
SecRuleUpdateTargetById 942200 !REQUEST_HEADERS:User-Agent

